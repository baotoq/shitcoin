apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: shitcoin
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shitcoin
      component: backend
  template:
    metadata:
      labels:
        app: shitcoin
        component: backend
    spec:
      containers:
        - name: backend
          image: shitcoin-backend
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/etc
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data
        - name: config
          configMap:
            name: shitcoin-config
